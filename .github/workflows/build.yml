name: Build Firmware

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/firmware/*.bin'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build All Firmware Variants
        run: pio run

      - name: Prepare firmware files
        run: |
          mkdir -p docs/firmware
          cp .pio/build/standard/firmware.bin docs/firmware/perpetual-calendar-standard.bin
          cp .pio/build/color_coded_clock/firmware.bin docs/firmware/perpetual-calendar-color-clock.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: docs/firmware/*.bin

      - name: Commit firmware to docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/firmware/*.bin
          git diff --staged --quiet || git commit -m "Update compiled firmware"
          git push
